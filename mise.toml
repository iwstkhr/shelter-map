[tools]
actionlint = "1.7.12"
hadolint = "2.14.0"
node = "24.18.0"
shellcheck = "0.11.0"
yamllint = "1.38.0"

[tasks.lint]
run = """
#!/usr/bin/env bash
set -euo pipefail
actionlint
find . -name 'Dockerfile*' -not -path '*/node_modules/*' -exec hadolint {} +
find . -name '*.sh' -not -path '*/node_modules/*' -not -path '*/.husky/_/*' -exec shellcheck {} +
find . \\( -name '*.yml' -o -name '*.yaml' \\) -not -path '*/node_modules/*' -exec yamllint {} +
"""
